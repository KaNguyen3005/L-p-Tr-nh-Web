<!doctype html>
<html>
 <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
<body class="font-sans h-screen">

  <!-- NAVBAR -->
  <nav class="bg-blue-600 px-6 py-3 flex items-center justify-between">
    <span class="text-white font-bold text-lg">MySite</span>

    <!-- Mobile: ẩn menu, hiện icon hamburger -->
    <div class="md:hidden text-white text-2xl cursor-pointer">&#9776;</div>

    <!-- Desktop: hiện menu -->
    <ul class="hidden md:flex gap-6 text-white text-sm">
      <li><a href="#" class="hover:underline">Home</a></li>
      <li><a href="#" class="hover:underline">About</a></li>
      <li><a href="#" class="hover:underline">Contact</a></li>
    </ul>
  </nav>

  <!-- HERO SECTION -->
  <main class="flex flex-col md:flex-row  items-center justify-center gap-8 px-10 py-16 h-full">

    <!-- Logo -->
    <div class="flex-shrink-0">
      <img
        src="https://cdn.icon-icons.com/icons2/2699/PNG/512/tailwindcss_logo_icon_170649.png"
        alt="Tailwind CSS Logo"
        class="w-64 md:w-78"
      />
    </div>

    <!-- Text + Button -->
    <div class="text-center md:text-left">
      <h2 class="text-2xl md:text-3xl font-bold text-gray-800 mb-2">
        Learn Tailwind CSS
      </h2>
      <p class="text-gray-500 mb-4 text-sm md:text-base">
        Build responsive layouts quickly with utility-first CSS.
      </p>
      <button
        class="bg-blue-600 text-white px-5 py-2 rounded text-sm
               hover:bg-blue-800 transition-colors duration-200"
      >
        Get Started
      </button>
    </div>

  </main>

</body>
</html>
