<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng Ký Người Dùng</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
      }

      .container {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 30px;
        max-width: 1000px;
        width: 100%;
      }

      .form-box {
        background: white;
        padding: 30px;
        border-radius: 10px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      }

      .form-box h2 {
        color: #333;
        margin-bottom: 20px;
        text-align: center;
        font-size: 24px;
      }

      .form-group {
        margin-bottom: 20px;
      }

      label {
        display: block;
        margin-bottom: 8px;
        color: #555;
        font-weight: 500;
      }

      input {
        width: 100%;
        padding: 12px;
        border: 2px solid #ddd;
        border-radius: 5px;
        font-size: 16px;
        transition: border-color 0.3s;
      }

      input:focus {
        outline: none;
        border-color: #667eea;
        box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
      }

      button {
        width: 100%;
        padding: 12px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        border-radius: 5px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.2s;
      }

      button:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
      }

      button:active {
        transform: translateY(0);
      }

      .response {
        margin-top: 20px;
        padding: 15px;
        border-radius: 5px;
        display: none;
        word-break: break-all;
      }

      .response.success {
        display: block;
        background: #d4edda;
        color: #155724;
        border: 1px solid #c3e6cb;
      }

      .response.error {
        display: block;
        background: #f8d7da;
        color: #721c24;
        border: 1px solid #f5c6cb;
      }

      .response h3 {
        margin-bottom: 10px;
        font-size: 16px;
      }

      .response pre {
        background: rgba(0, 0, 0, 0.1);
        padding: 10px;
        border-radius: 3px;
        font-size: 13px;
        overflow-x: auto;
      }

      @media (max-width: 768px) {
        .container {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <!-- FORM 1: GET /api/info -->
      <div class="form-box">
        <h2>FORM 1: Lấy Thông Tin</h2>
        <form id="form1">
          <div class="form-group">
            <label for="name1">Tên:</label>
            <input
              type="text"
              id="name1"
              name="name"
              placeholder="Nhập tên"
              required
            />
          </div>
          <div class="form-group">
            <label for="age1">Tuổi:</label>
            <input
              type="number"
              id="age1"
              name="age"
              placeholder="Nhập tuổi"
              required
            />
          </div>
          <button type="submit">Gửi GET Request</button>
        </form>
        <div id="response1" class="response"></div>
      </div>

      <!-- FORM 2: POST /api/register -->
      <div class="form-box">
        <h2>FORM 2: Đăng Ký Tài Khoản</h2>
        <form id="form2">
          <div class="form-group">
            <label for="name2">Tên:</label>
            <input
              type="text"
              id="name2"
              name="name"
              placeholder="Nhập tên"
              required
            />
          </div>
          <div class="form-group">
            <label for="age2">Tuổi:</label>
            <input
              type="number"
              id="age2"
              name="age"
              placeholder="Nhập tuổi"
              required
            />
          </div>
          <div class="form-group">
            <label for="email2">Email:</label>
            <input
              type="email"
              id="email2"
              name="email"
              placeholder="Nhập email"
              required
            />
          </div>
          <button type="submit">Gửi POST Request</button>
        </form>
        <div id="response2" class="response"></div>
      </div>
    </div>

    <script>
      const baseURL = "http://localhost:5500"
      
      // FORM 1: GET /api/info
      document.getElementById("form1").addEventListener("submit", async (e) => {
        e.preventDefault();
        const name = document.getElementById("name1").value;
        const age = document.getElementById("age1").value;
        const responseDiv = document.getElementById("response1");

        try {
          const response = await fetch(
            `${baseURL}/api/info?name=${encodeURIComponent(name)}&age=${age}`,
          );
          const data = await response.json();
          // const text = await response.text();
          // console.log(text);

          if (response.ok) {
            responseDiv.className = "response success";
            responseDiv.innerHTML = `
            <h3>✓ Thành công (age = ${age})</h3>
            <pre>${JSON.stringify(data, null, 2)}</pre>
          `;
          } else {
            responseDiv.className = "response error";
            responseDiv.innerHTML = `
            <h3>✗ Lỗi (age = ${age})</h3>
            <pre>${JSON.stringify(data, null, 2)}</pre>
          `;
          }
        } catch (error) {
          responseDiv.className = "response error";
          responseDiv.innerHTML = `<h3>Lỗi kết nối</h3><pre>${error.message}</pre>`;
        }
      });

      // FORM 2: POST /api/register
      document.getElementById("form2").addEventListener("submit", async (e) => {
        e.preventDefault();
        const name = document.getElementById("name2").value;
        const age = document.getElementById("age2").value;
        const email = document.getElementById("email2").value;
        const responseDiv = document.getElementById("response2");

        try {
          const response = await fetch(`${baseURL}/api/register`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({ name, age: parseInt(age), email }),
          });
          const data = await response.json();

          if (response.ok) {
            responseDiv.className = "response success";
            responseDiv.innerHTML = `
            <h3>✓ Thành công (Thiếu field)</h3>
            <pre>${JSON.stringify(data, null, 2)}</pre>
          `;
          } else {
            responseDiv.className = "response error";
            responseDiv.innerHTML = `
            <h3>✗ Lỗi (Thiếu field)</h3>
            <pre>${JSON.stringify(data, null, 2)}</pre>
          `;
          }
        } catch (error) {
          responseDiv.className = "response error";
          responseDiv.innerHTML = `<h3>Lỗi kết nối</h3><pre>${error.message}</pre>`;
        }
      });
    </script>
  </body>
</html>
